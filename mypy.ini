# mypy configuration for stomatopod-active-vision.
#
# Run:
#     mypy src/stomatopod_vision/
# Or:
#     make typecheck    (alias defined in the top-level Makefile)
#
# Philosophy: a *light* type check. We chase real bugs (unused imports,
# wrong arg types, attribute errors) but don't enforce annotations on
# every function — many helpers are tiny enough that types add noise.

[mypy]
python_version = 3.12
mypy_path = src
# Don't fail on missing __init__.py files (we use src-layout).
namespace_packages = true
explicit_package_bases = true

# Useful catches that don't require full annotation coverage:
warn_unused_ignores  = true
warn_redundant_casts = true
warn_return_any      = false
no_implicit_optional = true

# We don't insist on annotations everywhere. Real bugs (wrong arg types,
# undefined names, etc.) are still caught.
disallow_untyped_defs       = false
disallow_incomplete_defs    = false
check_untyped_defs          = true

# Show the source line of each error.
show_error_codes  = true
show_column_numbers = true
pretty            = true

# ----------------------------------------------------------------------
# Per-module overrides
# ----------------------------------------------------------------------

# MuJoCo doesn't ship type stubs; pretend it does.
[mypy-mujoco.*]
ignore_missing_imports = true

# matplotlib and mediapy: same situation, common in scientific Python.
[mypy-matplotlib.*]
ignore_missing_imports = true

[mypy-mediapy.*]
ignore_missing_imports = true

[mypy-imageio.*]
ignore_missing_imports = true

[mypy-imageio_ffmpeg.*]
ignore_missing_imports = true

# tifffile uses Python 3.12 type-statement syntax which mypy on 3.10 can't parse.
[mypy-tifffile.*]
ignore_errors = true
follow_imports = silent

[mypy-PIL.*]
ignore_missing_imports = true

[mypy-numpy.*]
ignore_missing_imports = false
